name: Deploy Astro site to GitHub Pages

on:
  # main 브랜치에 푸시될 때마다 자동 배포
  push:
    branches: [main]
  # Actions 탭에서 수동 실행도 가능
  workflow_dispatch:

# GitHub Pages 배포용 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 실행 (in-progress run은 취소)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
