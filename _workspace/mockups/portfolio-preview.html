<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Preview · Hyebin Woo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@phosphor-icons/webcomponents@2.1"></script>
<style>
  :root {
    --bg: #0e0e0e;
    --bg-2: #131313;
    --fg: #e2e2e2;
    --muted: #888888;
    --border: rgba(226,226,226,0.08);
    --accent: #008585;
    --accent-glow: rgba(0,133,133,0.15);
    --cyan: #ADFFFE;
    --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Shell container */
  .shell {
    display: grid;
    grid-template-rows: 56px 1fr;
    height: 100dvh;
  }

  /* Top tab bar */
  .tabbar {
    display: flex; align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-2);
    gap: 6px;
    overflow-x: auto;
  }
  .tab-brand {
    display: flex; align-items: center; gap: 10px;
    padding-right: 20px;
    margin-right: 8px;
    border-right: 1px solid var(--border);
    height: 100%;
  }
  .tab-brand-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(184,101,26,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(184,101,26,0); }
  }
  .tab-brand-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tab {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 16px;
    height: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    white-space: nowrap;
  }
  .tab:hover { color: var(--fg); }
  .tab.active {
    color: var(--fg);
    border-bottom-color: var(--accent);
  }
  .tab ph-icon, .tab [class*="ph-"] { color: inherit; }
  .tab-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.7;
  }
  .tab.active .tab-num { color: var(--accent); opacity: 1; }

  .tab-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .tab-action {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s var(--ease);
    text-decoration: none;
  }
  .tab-action:hover { color: var(--fg); border-color: var(--fg); }

  /* Iframe container */
  .stage {
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }
  .frame {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s var(--ease);
  }
  .frame.active {
    opacity: 1;
    visibility: visible;
  }

  /* Loading overlay */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    transition: opacity 0.3s var(--ease);
    pointer-events: none;
    z-index: 2;
    opacity: 0;
  }
  .loading.show { opacity: 1; }
  .loading-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: loadPulse 0.8s ease-in-out infinite;
  }
  @keyframes loadPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
  }

  /* Keyboard hint */
  .hint {
    position: fixed;
    bottom: 20px; right: 20px;
    padding: 10px 14px;
    background: rgba(20,20,19,0.9);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    z-index: 10;
    opacity: 0;
    transform: translateY(8px);
    animation: hintIn 0.6s var(--ease) 1.2s forwards, hintOut 0.4s var(--ease) 6s forwards;
    pointer-events: none;
  }
  @keyframes hintIn { to { opacity: 1; transform: translateY(0); } }
  @keyframes hintOut { to { opacity: 0; transform: translateY(8px); } }
  .hint kbd {
    padding: 2px 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
    color: var(--fg);
  }

  @media (max-width: 640px) {
    .tab-actions { display: none; }
    .tab-brand { padding-right: 12px; margin-right: 4px; }
    .tab { padding: 0 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- Tab bar -->
  <nav class="tabbar" role="tablist" aria-label="Portfolio preview">
    <div class="tab-brand">
      <div class="tab-brand-dot"></div>
      <span class="tab-brand-text">Hyebin · Preview</span>
    </div>

    <button class="tab active" role="tab" data-frame="landing">
      <ph-house weight="regular" size="14"></ph-house>
      <span>Landing · EN</span>
      <span class="tab-num">01</span>
    </button>
    <button class="tab" role="tab" data-frame="landing-ko">
      <ph-globe weight="regular" size="14"></ph-globe>
      <span>Landing · KO</span>
      <span class="tab-num">02</span>
    </button>
    <button class="tab" role="tab" data-frame="work">
      <ph-folder weight="regular" size="14"></ph-folder>
      <span>Case · Dark</span>
      <span class="tab-num">03</span>
    </button>
    <button class="tab" role="tab" data-frame="work-light">
      <ph-sun weight="regular" size="14"></ph-sun>
      <span>Case · Light</span>
      <span class="tab-num">04</span>
    </button>
    <button class="tab" role="tab" data-frame="writing">
      <ph-pencil-simple weight="regular" size="14"></ph-pencil-simple>
      <span>Writing</span>
      <span class="tab-num">05</span>
    </button>
    <button class="tab" role="tab" data-frame="resume">
      <ph-file-text weight="regular" size="14"></ph-file-text>
      <span>Resume</span>
      <span class="tab-num">06</span>
    </button>

    <div class="tab-actions">
      <button class="tab-action" id="btnReload">
        <ph-arrow-clockwise weight="regular" size="12"></ph-arrow-clockwise>
        Reload
      </button>
      <a class="tab-action" id="btnOpen" href="#" target="_blank" rel="noopener">
        <ph-arrow-square-out weight="regular" size="12"></ph-arrow-square-out>
        Open
      </a>
    </div>
  </nav>

  <!-- Stage (iframes) -->
  <div class="stage" id="stage">
    <div class="loading" id="loading"><div class="loading-dot"></div></div>
    <iframe class="frame active" data-frame="landing" src="portfolio-editorial-dense.html" title="Landing EN" loading="eager"></iframe>
    <iframe class="frame" data-frame="landing-ko" src="portfolio-editorial-dense-ko.html" title="Landing KO" loading="lazy"></iframe>
    <iframe class="frame" data-frame="work" src="portfolio-work-aed-kinetic.html" title="Case Study — AED Dark" loading="lazy"></iframe>
    <iframe class="frame" data-frame="work-light" src="portfolio-work-aed-light.html" title="Case Study — AED Light" loading="lazy"></iframe>
    <iframe class="frame" data-frame="writing" src="portfolio-writing.html" title="Writing Archive" loading="lazy"></iframe>
    <iframe class="frame" data-frame="resume" src="portfolio-resume.html" title="Resume" loading="lazy"></iframe>
  </div>

</div>

<div class="hint">
  Press <kbd>1</kbd> / <kbd>2</kbd> / <kbd>3</kbd> to switch · <kbd>R</kbd> to reload
</div>

<script>
  const frames = document.querySelectorAll('.frame');
  const tabs = document.querySelectorAll('.tab');
  const loading = document.getElementById('loading');
  const openBtn = document.getElementById('btnOpen');
  const reloadBtn = document.getElementById('btnReload');

  const fileMap = {
    landing: 'portfolio-editorial-dense.html',
    'landing-ko': 'portfolio-editorial-dense-ko.html',
    work: 'portfolio-work-aed-kinetic.html',
    'work-light': 'portfolio-work-aed-light.html',
    writing: 'portfolio-writing.html',
    resume: 'portfolio-resume.html',
  };

  function switchTo(key) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.frame === key));
    frames.forEach(f => f.classList.toggle('active', f.dataset.frame === key));
    openBtn.href = fileMap[key];
    // Persist last-viewed
    try { localStorage.setItem('hb-preview-frame', key); } catch(e) {}
    // Update URL hash
    history.replaceState(null, '', '#' + key);
  }

  function reloadActive() {
    const active = document.querySelector('.frame.active');
    if (!active) return;
    loading.classList.add('show');
    const src = active.src;
    active.src = 'about:blank';
    setTimeout(() => { active.src = src; }, 50);
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => switchTo(tab.dataset.frame));
  });

  reloadBtn.addEventListener('click', reloadActive);

  // Hide loading when iframe finishes
  frames.forEach(f => {
    f.addEventListener('load', () => loading.classList.remove('show'));
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Ignore if typing in input
    if (e.target.matches('input, textarea')) return;
    if (e.key === '1') switchTo('landing');
    else if (e.key === '2') switchTo('landing-ko');
    else if (e.key === '3') switchTo('work');
    else if (e.key === '4') switchTo('resume');
    else if (e.key === 'r' || e.key === 'R') reloadActive();
  });

  // Restore from hash or localStorage
  const initial = window.location.hash.replace('#', '')
    || (() => { try { return localStorage.getItem('hb-preview-frame'); } catch(e) { return null; } })()
    || 'landing';
  if (fileMap[initial]) switchTo(initial);
</script>

</body>
</html>
